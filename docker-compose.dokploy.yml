x-common: &common
  restart: unless-stopped
  stop_grace_period: 40s
  env_file: .env
  environment:
    # ── REQUIRED SECRETS ──
    - JWT_SECRET=${JWT_SECRET}
    - API_KEY_SECRET=${API_KEY_SECRET}
    - INITIAL_PASSWORD=${INITIAL_PASSWORD}
    
    # ── STORAGE & DATABASE ──
    - STORAGE_ENCRYPTION_KEY=${STORAGE_ENCRYPTION_KEY}
    - STORAGE_ENCRYPTION_KEY_VERSION=${STORAGE_ENCRYPTION_KEY_VERSION:-v1}
    - DISABLE_SQLITE_AUTO_BACKUP=${DISABLE_SQLITE_AUTO_BACKUP:-false}
    
    # ── NETWORK ──
    - PORT=${PORT:-20128}
    - DASHBOARD_PORT=${DASHBOARD_PORT:-${PORT:-20128}}
    - API_PORT=${API_PORT:-20129}
    - API_HOST=${API_HOST:-0.0.0.0}
    - NODE_ENV=${NODE_ENV:-production}
    - NEXT_PUBLIC_BASE_URL=${NEXT_PUBLIC_BASE_URL}
    - BASE_URL=${BASE_URL:-http://localhost:20128}
    
    # ── SECURITY ──
    - MACHINE_ID_SALT=${MACHINE_ID_SALT}
    - AUTH_COOKIE_SECURE=${AUTH_COOKIE_SECURE:-true}
    - REQUIRE_API_KEY=${REQUIRE_API_KEY:-true}
    - ALLOW_API_KEY_REVEAL=${ALLOW_API_KEY_REVEAL:-false}
    
    # ── PROXY & STEALTH ──
    - ENABLE_SOCKS5_PROXY=${ENABLE_SOCKS5_PROXY:-true}
    - NEXT_PUBLIC_ENABLE_SOCKS5_PROXY=${NEXT_PUBLIC_ENABLE_SOCKS5_PROXY:-true}
    - ENABLE_TLS_FINGERPRINT=${ENABLE_TLS_FINGERPRINT:-true}
    - CLI_COMPAT_ALL=${CLI_COMPAT_ALL:-1}
    
    # ── SYNC & AGENTS ──
    - PROVIDER_LIMITS_SYNC_INTERVAL_MINUTES=${PROVIDER_LIMITS_SYNC_INTERVAL_MINUTES:-70}
    - PRICING_SYNC_ENABLED=${PRICING_SYNC_ENABLED:-true}
    - PRICING_SYNC_INTERVAL=${PRICING_SYNC_INTERVAL:-86400}
    - PRICING_SYNC_SOURCES=${PRICING_SYNC_SOURCES:-litellm}
    
    # ── OAUTH CREDENTIALS ──
    - CLAUDE_OAUTH_CLIENT_ID=${CLAUDE_OAUTH_CLIENT_ID}
    - CODEX_OAUTH_CLIENT_ID=${CODEX_OAUTH_CLIENT_ID}
    - GEMINI_OAUTH_CLIENT_ID=${GEMINI_OAUTH_CLIENT_ID}
    - GEMINI_OAUTH_CLIENT_SECRET=${GEMINI_OAUTH_CLIENT_SECRET}
    - GEMINI_CLI_OAUTH_CLIENT_ID=${GEMINI_CLI_OAUTH_CLIENT_ID}
    - GEMINI_CLI_OAUTH_CLIENT_SECRET=${GEMINI_CLI_OAUTH_CLIENT_SECRET}
    - QWEN_OAUTH_CLIENT_ID=${QWEN_OAUTH_CLIENT_ID}
    - KIMI_CODING_OAUTH_CLIENT_ID=${KIMI_CODING_OAUTH_CLIENT_ID}
    - ANTIGRAVITY_OAUTH_CLIENT_ID=${ANTIGRAVITY_OAUTH_CLIENT_ID}
    - ANTIGRAVITY_OAUTH_CLIENT_SECRET=${ANTIGRAVITY_OAUTH_CLIENT_SECRET}
    - GITHUB_OAUTH_CLIENT_ID=${GITHUB_OAUTH_CLIENT_ID}
    - QODER_OAUTH_CLIENT_SECRET=${QODER_OAUTH_CLIENT_SECRET}
    
    # ── USER AGENTS ──
    - CLAUDE_USER_AGENT=${CLAUDE_USER_AGENT:-claude-cli/1.0.83 (external, cli)}
    - CODEX_USER_AGENT=${CODEX_USER_AGENT:-codex-cli/0.92.0 (Windows 10.0.26100; x64)}
    - GITHUB_USER_AGENT=${GITHUB_USER_AGENT:-GitHubCopilotChat/0.26.7}
    - ANTIGRAVITY_USER_AGENT=${ANTIGRAVITY_USER_AGENT:-antigravity/1.104.0 darwin/arm64}
    - KIRO_USER_AGENT=${KIRO_USER_AGENT:-AWS-SDK-JS/3.0.0 kiro-ide/1.0.0}
    - QODER_USER_AGENT=${QODER_USER_AGENT:-Qoder-Cli}
    - QWEN_USER_AGENT=${QWEN_USER_AGENT:-QwenCode/0.12.3 (linux; x64)}
    - CURSOR_USER_AGENT=${CURSOR_USER_AGENT:-connect-es/1.6.1}
    - GEMINI_CLI_USER_AGENT=${GEMINI_CLI_USER_AGENT:-google-api-nodejs-client/9.15.1}
    
    # ── NETWORKING ──
    - LOCAL_HOSTNAMES=${LOCAL_HOSTNAMES:-cliproxyapi,omniroute}
    
    # ── LOGS ──
    - APP_LOG_TO_FILE=${APP_LOG_TO_FILE:-true}
  volumes:
    - omniroute-data:/app/data
  healthcheck:
    test: ["CMD", "node", "healthcheck.mjs"]
    interval: 30s
    timeout: 5s
    retries: 3
    start_period: 15s

services:
  omniroute-cli:
    <<: *common
    container_name: omniroute
    build:
      context: .
      target: runner-cli
    image: omniroute:cli
    # ports:
    #   - "${DASHBOARD_PORT:-${PORT:-20128}}:${DASHBOARD_PORT:-${PORT:-20128}}"
    #   - "${API_PORT:-20129}:${API_PORT:-20129}"
    volumes:
      - omniroute-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/libexec/docker/cli-plugins:/usr/libexec/docker/cli-plugins:ro
      - ${AUTO_UPDATE_HOST_REPO_DIR:-.}:/workspace/omniroute:rw
    networks:
      - dokploy-network
      - default

  cliproxyapi:
    container_name: cliproxyapi
    image: eceasy/cli-proxy-api:latest
    restart: unless-stopped
    # ports:
    #   - "${CLIPROXYAPI_PORT:-8317}:${CLIPROXYAPI_PORT:-8317}"
    volumes:
      - cliproxyapi-data:/root/.cli-proxy-api
      - cliproxyapi-config:/CLIProxyAPI
    environment:
      - PORT=${CLIPROXYAPI_PORT:-8317}
      - HOST=0.0.0.0
    entrypoint: >
      /bin/sh -c "
      if [ ! -f /CLIProxyAPI/config.yaml ]; then
        echo 'host: \"0.0.0.0\"' > /CLIProxyAPI/config.yaml;
        echo 'port: 8317' >> /CLIProxyAPI/config.yaml;
        echo 'auth-dir: \"/root/.cli-proxy-api\"' >> /CLIProxyAPI/config.yaml;
      fi;
      exec /CLIProxyAPI/CLIProxyAPI
      "
    networks:
      - dokploy-network
      - default

volumes:
  cliproxyapi-data:
    name: cliproxyapi-data
  cliproxyapi-config:
    name: cliproxyapi-config
  omniroute-data:
    name: omniroute-data

networks:
  dokploy-network:
    external: true
